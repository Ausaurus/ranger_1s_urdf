controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # wheel_holder_controller:
    #   type: position_controllers/JointGroupPositionController

    # diff_drive_base_controller:
    #   type: diff_drive_controller/DiffDriveController

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController 

ackermann_steering_controller:
  ros__parameters:
    reference_timeout: 2.0
    front_steering: true
    open_loop: false
    position_feedback: true
    use_stamped_vel: true
    
    # FRONT WHEELS MUST BE THE STEERING KNUCKLES (Revolute joints)
    front_wheels_names: [wheel_holder_joint_rf, wheel_holder_joint_lf]
    
    # REAR WHEELS ARE THE DRIVING WHEELS (Continuous joints)
    rear_wheels_names: [wheel_joint_rb, wheel_joint_lb]

    # CORRECTED KINEMATICS PARAMETERS
    wheelbase: 1.45057           
    front_wheel_track: 1.4024    
    rear_wheel_track: 1.4024     
    front_wheels_radius: 0.194   
    rear_wheels_radius: 0.194

    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

